<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fight For Me | Reader</title>
  <meta name="robots" content="noindex,nofollow" />

  <script>
    (function () {
      var ALLOWED = {
        "reader.yumistories.com": true,
        "yumistories.com": true,
        "www.yumistories.com": true
      };

      var SHELF_URL = "https://yumistories.com/book-keeper-secret-shelf";

      if (!ALLOWED[location.hostname]) {
        location.replace(SHELF_URL);
        return;
      }

      try {
        if (top !== self) top.location = self.location;
      } catch (e) {}

      if (document.referrer) {
        try {
          var refHost = new URL(document.referrer).hostname;
          if (!ALLOWED[refHost]) {
            location.replace(SHELF_URL);
          }
        } catch (e) {}
      }
    })();
  </script>

  <style>
    :root {
      --bg: #0f1115;
      --panel: #151821;
      --card: #0c0f14;
      --text: #f2f2f2;
      --muted: #98a2b3;
      --line: #2a3142;
      --accent: #1a1f2b;
      --zoom: 1;
    }

    body.light {
      --bg: #ffffff;
      --panel: #f7f8fa;
      --card: #eef1f5;
      --text: #101418;
      --muted: #4b5563;
      --line: #d7dde5;
      --accent: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(21, 24, 33, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    body.light .topbar {
      background: rgba(247, 248, 250, 0.92);
    }

    .title {
      font-weight: 700;
      margin-right: auto;
      white-space: nowrap;
    }

    .btn,
    .num {
      border: 1px solid var(--line);
      background: var(--accent);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      font: inherit;
    }

    .btn {
      cursor: pointer;
    }

    .num {
      width: 72px;
      text-align: center;
    }

    .muted {
      color: var(--muted);
    }

    .sep {
      width: 1px;
      height: 28px;
      background: var(--line);
      margin: 0 4px;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 16px 12px 50px;
    }

    .page {
      position: relative;
      margin: 0 auto 18px;
      transform: scale(var(--zoom));
      transform-origin: top center;
      transition: transform 0.15s ease;
      min-height: 50vh;
    }

    .page img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 8px;
      background: var(--card);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }

    .tag {
      position: absolute;
      right: 10px;
      bottom: 10px;
      font-size: 12px;
      padding: 2px 7px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.55);
      color: white;
    }

    .alert {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 200;
      max-width: 360px;
      display: none;
      padding: 10px 12px;
      border-radius: 10px;
      background: #2a1a1a;
      border: 1px solid #6b2a2a;
      color: #ffe3e3;
      font-size: 12px;
    }

    a.link {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px dashed var(--line);
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Fight For Me</div>

    <button class="btn" id="prev">← Prev</button>

    <span class="muted">Page</span>
    <input class="num" id="go" type="number" min="1" value="1" inputmode="numeric" />
    <span class="muted">/ <span id="total">0</span></span>

    <button class="btn" id="next">Next →</button>

    <div class="sep"></div>

    <button class="btn" id="fit">Fit</button>
    <button class="btn" id="zin">+</button>
    <button class="btn" id="zout">-</button>
    <button class="btn" id="mode">🌙/☀️</button>

    <div style="margin-left:4px;">
      <a class="link" href="https://yumistories.com/book-keeper-secret-shelf">Library</a>
    </div>
  </div>

  <div class="wrap" id="pages"></div>
  <div class="alert" id="alert"></div>

  <script>
    (function () {
      var CONFIG = {
        title: "Fight For Me",
        basePath: "./images/",
        totalPages: 246,
        coverName: "FFM.jpg",
        prefix: "FFM_",
        extension: ".jpg",
        shelfUrl: "https://yumistories.com/book-keeper-secret-shelf"
      };

      var pagesWrap = document.getElementById("pages");
      var totalEl = document.getElementById("total");
      var goEl = document.getElementById("go");
      var prevBtn = document.getElementById("prev");
      var nextBtn = document.getElementById("next");
      var fitBtn = document.getElementById("fit");
      var zinBtn = document.getElementById("zin");
      var zoutBtn = document.getElementById("zout");
      var modeBtn = document.getElementById("mode");
      var alertEl = document.getElementById("alert");

      var currentPage = 1;
      var zoom = 1;
      var pages = [];

      function clamp(n, min, max) {
        return Math.max(min, Math.min(max, n));
      }

      function showAlert(msg) {
        alertEl.innerHTML = msg;
        alertEl.style.display = "block";
      }

      function pageFile(pageNumber) {
        if (pageNumber === 1) return CONFIG.basePath + CONFIG.coverName;

        var n = String(pageNumber - 1).padStart(3, "0");
        return CONFIG.basePath + CONFIG.prefix + n + CONFIG.extension;
      }

      function buildPages() {
        for (var i = 1; i <= CONFIG.totalPages; i++) {
          var page = document.createElement("div");
          page.className = "page";
          page.dataset.page = i;

          var img = document.createElement("img");
          img.alt = CONFIG.title + " | Page " + i;
          img.loading = i <= 3 ? "eager" : "lazy";
          img.decoding = "async";
          img.src = pageFile(i);

          img.onerror = function () {
            this.closest(".page").style.display = "none";
          };

          var tag = document.createElement("div");
          tag.className = "tag";
          tag.textContent = i;

          page.appendChild(img);
          page.appendChild(tag);
          pagesWrap.appendChild(page);
          pages.push(page);
        }
      }

      function getVisiblePages() {
        return pages.filter(function (page) {
          return page.style.display !== "none";
        });
      }

      function getVisiblePageNumbers() {
        return getVisiblePages().map(function (page) {
          return parseInt(page.dataset.page, 10);
        });
      }

      function updateTotal() {
        totalEl.textContent = getVisiblePages().length;
      }

      function visibleIndexFromRealPage(realPage) {
        var nums = getVisiblePageNumbers();
        var idx = nums.indexOf(realPage);
        return idx >= 0 ? idx + 1 : 1;
      }

      function realPageFromVisibleIndex(index) {
        var nums = getVisiblePageNumbers();
        return nums[index - 1] || nums[0] || 1;
      }

      function nearestVisiblePage(n) {
        var nums = getVisiblePageNumbers();
        if (!nums.length) return 1;
        if (nums.indexOf(n) !== -1) return n;

        var nearest = nums[0];
        var diff = Math.abs(nums[0] - n);

        for (var i = 1; i < nums.length; i++) {
          var d = Math.abs(nums[i] - n);
          if (d < diff) {
            nearest = nums[i];
            diff = d;
          }
        }
        return nearest;
      }

      function setZoom(value) {
        zoom = clamp(value, 0.6, 2.5);
        document.documentElement.style.setProperty("--zoom", zoom);
      }

      function scrollToPage(realPage, smooth) {
        realPage = nearestVisiblePage(clamp(realPage, 1, CONFIG.totalPages));
        currentPage = realPage;

        var el = document.querySelector('.page[data-page="' + realPage + '"]');
        if (el) {
          window.scrollTo({
            top: el.offsetTop - 70,
            behavior: smooth === false ? "auto" : "smooth"
          });
        }

        goEl.value = visibleIndexFromRealPage(realPage);

        var url = new URL(location.href);
        url.searchParams.set("p", realPage);
        history.replaceState(null, "", url.toString());
      }

      function updateCurrentByScroll() {
        var visible = getVisiblePages();
        if (!visible.length) return;

        var bestPage = currentPage;
        var bestDistance = Infinity;

        visible.forEach(function (page) {
          var rect = page.getBoundingClientRect();
          var center = Math.abs(rect.top - 120);
          if (rect.bottom > 120 && center < bestDistance) {
            bestDistance = center;
            bestPage = parseInt(page.dataset.page, 10);
          }
        });

        currentPage = bestPage;
        goEl.value = visibleIndexFromRealPage(currentPage);
      }

      function fitToWidth() {
        var firstVisible = getVisiblePages()[0];
        if (!firstVisible) return setZoom(1);

        var img = firstVisible.querySelector("img");
        if (!img || !img.naturalWidth) return setZoom(1);

        var containerWidth = pagesWrap.clientWidth;
        var imageWidth = img.naturalWidth;
        setZoom(containerWidth / imageWidth);
      }

      prevBtn.addEventListener("click", function () {
        var nums = getVisiblePageNumbers();
        var idx = nums.indexOf(currentPage);
        if (idx > 0) scrollToPage(nums[idx - 1]);
      });

      nextBtn.addEventListener("click", function () {
        var nums = getVisiblePageNumbers();
        var idx = nums.indexOf(currentPage);
        if (idx >= 0 && idx < nums.length - 1) scrollToPage(nums[idx + 1]);
      });

      zinBtn.addEventListener("click", function () {
        setZoom(zoom + 0.15);
      });

      zoutBtn.addEventListener("click", function () {
        setZoom(zoom - 0.15);
      });

      fitBtn.addEventListener("click", fitToWidth);

      modeBtn.addEventListener("click", function () {
        document.body.classList.toggle("light");
      });

      goEl.addEventListener("change", function () {
        var visibleIndex = parseInt(goEl.value || "1", 10);
        var realPage = realPageFromVisibleIndex(visibleIndex);
        scrollToPage(realPage);
      });

      window.addEventListener("scroll", updateCurrentByScroll, { passive: true });

      window.addEventListener("keydown", function (e) {
        var key = (e.key || "").toLowerCase();

        if (key === "arrowleft") prevBtn.click();
        if (key === "arrowright") nextBtn.click();
        if (key === "+") zinBtn.click();
        if (key === "-") zoutBtn.click();
        if (key === "f") fitBtn.click();
      });

      document.addEventListener("contextmenu", function (e) {
        e.preventDefault();
      }, true);

      document.addEventListener("dragstart", function (e) {
        if (e.target && e.target.tagName === "IMG") e.preventDefault();
      }, true);

      document.addEventListener("selectstart", function (e) {
        e.preventDefault();
      }, true);

      document.addEventListener("keydown", function (e) {
        var key = (e.key || "").toLowerCase();

        if ((e.ctrlKey || e.metaKey) && ["s", "u", "p"].includes(key)) {
          e.preventDefault();
          e.stopPropagation();
        }

        if ((e.ctrlKey || e.metaKey) && e.shiftKey && ["i", "j", "c"].includes(key)) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, true);

      buildPages();

      window.addEventListener("load", function () {
        setTimeout(function () {
          updateTotal();

          if (!getVisiblePages().length) {
            showAlert(
              "Walang images na makita.<br>" +
              "Check mo ito:<br>" +
              "<code>./images/" + CONFIG.coverName + "</code><br>" +
              "<code>./images/" + CONFIG.prefix + "001" + CONFIG.extension + "</code><br>" +
              "Case-sensitive si Netlify. Maarte siya."
            );
            return;
          }

          var start = parseInt(new URLSearchParams(location.search).get("p") || "1", 10);
          scrollToPage(start, false);
        }, 300);
      });
    })();
  </script>
</body>
</html>
