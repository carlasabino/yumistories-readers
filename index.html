<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Secret Library</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3efe9;
      color: #2e1f14;
    }

    .container {
      max-width: 1700px;
      margin: 0 auto;
      padding: 40px 60px 80px;
    }

    .main-title {
      text-align: center;
      font-size: 58px;
      font-weight: 700;
      margin: 0;
    }

    .main-subtitle {
      text-align: center;
      font-size: 24px;
      color: #7b5b40;
      margin: 14px 0 40px;
    }

    .series-title {
      font-size: 40px;
      font-weight: 700;
      margin: 40px 0 30px;
      letter-spacing: 1px;
    }

    .shelf {
      display: grid;
      grid-template-columns: repeat(3, minmax(280px, 1fr));
      gap: 34px;
    }

    .book {
      background: #f8f4ee;
      border: 1px solid #e3d2bf;
      border-radius: 24px;
      padding: 24px 24px 20px;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .book:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
    }

    .book a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .book img {
      width: 210px;
      height: 300px;
      object-fit: cover;
      display: block;
      margin: 0 auto 16px;
      border-radius: 18px;
      background: #d9d9d9;
    }

    .book-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .book-sub {
      font-size: 22px;
      color: #8a6445;
    }

    @media (max-width: 1200px) {
      .shelf {
        grid-template-columns: repeat(2, minmax(280px, 1fr));
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 30px 20px 60px;
      }

      .main-title {
        font-size: 40px;
      }

      .main-subtitle {
        font-size: 20px;
      }

      .series-title {
        font-size: 30px;
      }

      .shelf {
        grid-template-columns: 1fr;
      }

      .book img {
        width: 180px;
        height: 260px;
      }

      .book-title {
        font-size: 22px;
      }

      .book-sub {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="main-title">The Secret Library</h1>
    <p class="main-subtitle">Choose a story to enter.</p>

    <h2 class="series-title">FOR ME SERIES</h2>

    <div class="shelf">
      <div class="book">
        <a href="for-me-fight-for-me/">
          <img src="for-me-fight-for-me/FFM.jpg" alt="Fight For Me Cover">
          <div class="book-title">Fight For Me</div>
          <div class="book-sub">Click to open story</div>
        </a>
      </div>

      <div class="book">
        <a href="for-me-stay-for-me/">
          <img src="for-me-stay-for-me/SFM.jpg" alt="Stay For Me Cover">
          <div class="book-title">Stay For Me</div>
          <div class="book-sub">Click to open story</div>
        </a>
      </div>

      <div class="book">
        <a href="the-royal-heartbreaker/">
          <img src="the-royal-heartbreaker/TRH.jpg" alt="The Royal Heartbreaker Cover">
          <div class="book-title">The Royal Heartbreaker</div>
          <div class="book-sub">Click to open story</div>
        </a>
      </div>
    </div>
  </div>

</body>
</html>
